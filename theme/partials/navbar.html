<nav id="mainNav" class="navbar navbar-expand-lg navbar-light">
  <div class="container py-2">
    <a class="navbar-brand fw-semibold" href="#top">Ivan Ogasawara</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
            aria-controls="nav" aria-expanded="false" aria-label="{{ ui.toggle_navigation }}">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
        {% for item in config.extra.nav_sections %}
          <li class="nav-item"><a class="nav-link" href="#{{ item.id }}">{{ ui.nav[item.label_key] }}</a></li>
        {% endfor %}
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            {{ ui.language }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            {% for language in config.extra.languages %}
              <li>
                <a class="dropdown-item{% if language.locale == current_locale %} active{% endif %}"
                   href="{{ base_url }}/{{ language.path }}"
                   lang="{{ language.locale }}"
                   {% if language.locale == current_locale %}aria-current="true"{% endif %}>
                  {{ language.name }}
                </a>
              </li>
            {% endfor %}
          </ul>
        </li>
        <li class="nav-item">
          <a class="btn btn-primary ms-lg-2" href="#contact">{{ ui.contact }}</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
