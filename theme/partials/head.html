<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.meta.title %}{{ page.meta.title }}{% else %}{{ config.site_name }}{% endif %}</title>
  <meta name="description" content="{% if page.meta.description %}{{ page.meta.description }}{% else %}{{ config.site_description }}{% endif %}">
  <meta name="theme-color" content="#10b981" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Caveat:wght@600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="icon" href="{{ 'favicon.ico' | url }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ 'favicon-32.png' | url }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ 'favicon-io-emerald-512.png' | url }}">
  <link rel="apple-touch-icon" href="{{ 'apple-touch-icon.png' | url }}">
  {% for language in config.extra.languages %}
    <link rel="alternate" hreflang="{{ language.locale }}" href="{{ base_url }}/{{ language.path }}">
  {% endfor %}
  {% for path in config.extra_css %}
    <link href="{{ path | url }}" rel="stylesheet">
  {% endfor %}
</head>
